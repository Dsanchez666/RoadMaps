<div class="page">
  <div *ngIf="loading">Cargando...</div>

  <div *ngIf="!loading && screenError" class="note">
    {{ screenError }}
  </div>

  <div *ngIf="!loading && roadmap && !screenError">
    <app-roadmap-timeline
      [data]="config"
      [allowLoad]="true"
      (dataChange)="onConfigChange($event)"
    ></app-roadmap-timeline>
  </div>

  <div *ngIf="!loading && !roadmap && !screenError" class="note">
    Roadmap no encontrado.
  </div>
</div>
