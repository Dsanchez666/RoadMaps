<div class="container">
  <h1>Roadmaps</h1>

  <ng-container *ngIf="!connected">
    <app-database-config (connectedChange)="onConnectedChange($event)"></app-database-config>
  </ng-container>

  <ng-container *ngIf="connected">
    <div class="toolbar">
      <button (click)="disconnect()">Desconectar BD</button>
    </div>
    <app-roadmap-create></app-roadmap-create>
    <app-roadmap-list></app-roadmap-list>
  </ng-container>
</div>
