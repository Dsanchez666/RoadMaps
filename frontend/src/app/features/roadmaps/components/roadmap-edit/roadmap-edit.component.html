<div class="page">
  <div *ngIf="loading">Cargando...</div>

  <div *ngIf="!loading && screenError" class="message error">
    {{ screenError }}
  </div>

  <div *ngIf="!loading && roadmap && config && !screenError">
    <div class="header">
      <h2>Configurador</h2>
      <div class="actions">
        <button (click)="onTogglePreview()">{{ preview ? 'Ocultar vista' : 'Vista previa' }}</button>
        <button (click)="onSave()">Guardar</button>
        <button (click)="onDiscard()">Descartar</button>
      </div>
    </div>

    <section class="card">
      <h3>Producto</h3>
      <div class="grid-2">
        <label>
          Producto
          <input [(ngModel)]="config.producto" [ngModelOptions]="{standalone:true}" />
        </label>
        <label>
          Organización
          <input [(ngModel)]="config.organizacion" [ngModelOptions]="{standalone:true}" />
        </label>
      </div>
      <div class="grid-2">
        <label>
          Horizonte inicio
          <input [(ngModel)]="config.horizonte_base.inicio" [ngModelOptions]="{standalone:true}" placeholder="2026-T1" />
        </label>
        <label>
          Horizonte fin
          <input [(ngModel)]="config.horizonte_base.fin" [ngModelOptions]="{standalone:true}" placeholder="2030-T4" />
        </label>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h3>Ejes estratégicos</h3>
        <button (click)="addAxis()">Añadir eje</button>
      </div>
      <div class="axis" *ngFor="let eje of config.ejes_estrategicos; let i = index">
        <div class="axis-header">
          <strong>Eje {{ i + 1 }}</strong>
          <button class="danger" (click)="removeAxis(i)">Eliminar</button>
        </div>
        <div class="grid-3">
          <label>
            ID
            <input [(ngModel)]="eje.id" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Nombre
            <input [(ngModel)]="eje.nombre" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Color
            <input type="color" [(ngModel)]="eje.color" [ngModelOptions]="{standalone:true}" />
          </label>
        </div>
        <label>
          Descripción
          <textarea [(ngModel)]="eje.descripcion" [ngModelOptions]="{standalone:true}" rows="3"></textarea>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h3>Iniciativas</h3>
        <button (click)="addInitiative()">Añadir iniciativa</button>
      </div>
      <div class="initiative" *ngFor="let init of config.iniciativas; let i = index">
        <div class="axis-header">
          <strong>Iniciativa {{ i + 1 }}</strong>
          <button class="danger" (click)="removeInitiative(i)">Eliminar</button>
        </div>
        <div class="grid-3">
          <label>
            ID
            <input [(ngModel)]="init.id" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Nombre
            <input [(ngModel)]="init.nombre" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Eje
            <select [(ngModel)]="init.eje" [ngModelOptions]="{standalone:true}">
              <option value="">Selecciona eje</option>
              <option *ngFor="let eje of config.ejes_estrategicos" [value]="eje.id">
                {{ eje.id }} - {{ eje.nombre }}
              </option>
            </select>
          </label>
        </div>
        <div class="grid-3">
          <label>
            Tipo
            <input [(ngModel)]="init.tipo" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Expediente
            <input [(ngModel)]="init.expediente" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Certeza
            <select [(ngModel)]="init.certeza" [ngModelOptions]="{standalone:true}">
              <option value="">Seleccione</option>
              <option value="comprometido">Comprometido</option>
              <option value="planificado">Planificado</option>
              <option value="exploratorio">Exploratorio</option>
            </select>
          </label>
        </div>
        <div class="grid-3">
          <label>
            Inicio
            <input [(ngModel)]="init.inicio" [ngModelOptions]="{standalone:true}" placeholder="2026-T1" />
          </label>
          <label>
            Fin
            <input [(ngModel)]="init.fin" [ngModelOptions]="{standalone:true}" placeholder="2026-T4" />
          </label>
          <label>
            Impacto principal
            <input [(ngModel)]="init.impacto_principal" [ngModelOptions]="{standalone:true}" />
          </label>
        </div>
        <div class="grid-2">
          <label>
            Usuarios afectados
            <input [(ngModel)]="init.usuarios_afectados" [ngModelOptions]="{standalone:true}" />
          </label>
          <label>
            Objetivo
            <textarea [(ngModel)]="init.objetivo" [ngModelOptions]="{standalone:true}" rows="2"></textarea>
          </label>
        </div>
        <div class="dependencies">
          <div class="section-header">
            <h4>Dependencias</h4>
            <button (click)="addDependency(init)">Añadir dependencia</button>
          </div>
          <div class="dependency" *ngFor="let dep of init.dependencias; let d = index">
            <input [(ngModel)]="dep.iniciativa" [ngModelOptions]="{standalone:true}" placeholder="ID iniciativa" />
            <input [(ngModel)]="dep.tipo" [ngModelOptions]="{standalone:true}" placeholder="Tipo" />
            <button class="danger" (click)="removeDependency(init, d)">Quitar</button>
          </div>
        </div>
      </div>
    </section>

    <div *ngIf="message" class="message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
      {{ message }}
    </div>

    <section class="card" *ngIf="preview">
      <h3>Vista previa</h3>
      <app-roadmap-timeline [data]="config" [allowLoad]="true" (dataChange)="config = $event"></app-roadmap-timeline>
    </section>
  </div>

  <div *ngIf="!loading && !roadmap && !screenError" class="note">
    Roadmap no encontrado.
  </div>
</div>
