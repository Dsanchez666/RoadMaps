<header class="app-header">
  <div class="left">
    <a routerLink="/roadmaps" class="brand">Roadmaps</a>
  </div>

  <div class="center">
    <nav class="main-nav" *ngIf="authService.isAuthenticated">
      <a routerLink="/roadmaps" routerLinkActive="active">Roadmaps</a>
      <a routerLink="/admin/users" routerLinkActive="active" *ngIf="authService.currentUser?.rol === 'ADMIN'">Usuarios</a>
    </nav>
  </div>

  <div class="right">
    <span class="user-info" *ngIf="authService.isAuthenticated">
      {{ authService.currentUser?.username }} ({{ authService.currentUser?.rol }})
    </span>

    <span
      class="status"
      [class.connected]="status?.connected"
      [class.disconnected]="!status?.connected"
      [title]="status?.connectionUrl || ''"
    >
      {{ status?.connected ? 'Conectado' : 'Desconectado' }}
    </span>

    <button *ngIf="!status?.connected && !isDatabaseRoute()" (click)="reconnect()" [disabled]="reconnecting">
      {{ reconnecting ? 'Reconectando...' : 'Reconectar' }}
    </button>

    <button *ngIf="authService.isAuthenticated" (click)="logout()">Cerrar Sesión</button>
  </div>
</header>

<div *ngIf="reconnectError" class="top-error">{{ reconnectError }}</div>

<main class="page">
  <router-outlet></router-outlet>
</main>
