<section class="auth-page">
  <h2>Crear contraseña inicial</h2>

  <form (ngSubmit)="submit()" class="auth-form">
    <label>
      Usuario
      <input type="text" [(ngModel)]="username" name="username" required autocomplete="username" />
    </label>

    <label>
      Nueva contraseña
      <input type="password" [(ngModel)]="newPassword" name="newPassword" required autocomplete="new-password" />
    </label>

    <label>
      Confirmar contraseña
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required autocomplete="new-password" />
    </label>

    <button type="submit" [disabled]="loading">{{ loading ? 'Guardando...' : 'Guardar contraseña' }}</button>
  </form>

  <div class="error" *ngIf="error">{{ error }}</div>
</section>
