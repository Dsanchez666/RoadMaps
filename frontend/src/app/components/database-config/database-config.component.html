<div class="database-shell">
<form class="database-config" (ngSubmit)="connect()">
  <h2>Configuración de Base de Datos</h2>
  
  <!-- Database Type Selection -->
  <div class="type-selector">
    <label>Tipo de Base de Datos:</label>
    <select [(ngModel)]="selectedType" name="selectedType">
      <option value="mysql">MySQL</option>
      <option value="oracle">Oracle</option>
    </select>
  </div>

  <!-- MySQL Configuration -->
  <div *ngIf="selectedType === 'mysql'" class="config-form">
    <h3>Configuración MySQL</h3>
    <div>
      <label>Host:</label>
      <input [(ngModel)]="mysqlHost" name="mysqlHost" type="text" />
    </div>
    <div>
      <label>Puerto:</label>
      <input [(ngModel)]="mysqlPort" name="mysqlPort" type="number" />
    </div>
    <div>
      <label>Usuario:</label>
      <input [(ngModel)]="mysqlUser" name="mysqlUser" type="text" />
    </div>
    <div>
      <label>Contraseña:</label>
      <input [(ngModel)]="mysqlPassword" name="mysqlPassword" type="password" />
    </div>
    <div>
      <label>Base de Datos:</label>
      <input [(ngModel)]="mysqlDatabase" name="mysqlDatabase" type="text" />
    </div>
  </div>

  <!-- Oracle Configuration -->
  <div *ngIf="selectedType === 'oracle'" class="config-form">
    <h3>Configuración Oracle</h3>
    <div>
      <label>Host:</label>
      <input [(ngModel)]="oracleHost" name="oracleHost" type="text" />
    </div>
    <div>
      <label>Puerto:</label>
      <input [(ngModel)]="oraclePort" name="oraclePort" type="number" />
    </div>
    <div>
      <label>Usuario:</label>
      <input [(ngModel)]="oracleUser" name="oracleUser" type="text" />
    </div>
    <div>
      <label>Contraseña:</label>
      <input [(ngModel)]="oraclePassword" name="oraclePassword" type="password" />
    </div>
    <div>
      <label>SID:</label>
      <input [(ngModel)]="oracleSid" name="oracleSid" type="text" />
    </div>
  </div>

  <!-- Connection Status -->
  <div *ngIf="status" class="status" [ngClass]="{ connected: status.connected }">
    <strong>Estado:</strong> {{ status.connected ? 'Conectado' : 'Desconectado' }}
    <p>{{ status.connectionUrl }}</p>
  </div>

  <!-- Message -->
  <div *ngIf="message" class="message" [ngClass]="messageType">
    {{ message }}
  </div>

  <!-- Action Buttons -->
  <div class="buttons">
    <button type="submit" [disabled]="connecting">
      {{ connecting ? 'Conectando...' : 'Conectar' }}
    </button>
    <button type="button" (click)="disconnect()" *ngIf="status?.connected">Desconectar</button>
  </div>
</form>
</div>
