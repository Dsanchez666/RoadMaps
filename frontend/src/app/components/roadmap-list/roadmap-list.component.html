<section class="toolbar">
  <h2>Roadmaps</h2>
  <div class="role-badge">
    👤 {{ authService.currentUser?.username }}
    <span [ngClass]="'role-' + (authService.currentUser?.rol || '').toLowerCase()">
      {{ authService.currentUser?.rol }}
    </span>
  </div>
</section>

<div *ngIf="connectionError" class="error">
  {{ connectionError }}
  <button (click)="reconnect()" [disabled]="reconnecting">
    {{ reconnecting ? 'Reconectando...' : 'Reconectar' }}
  </button>
</div>

<div *ngIf="loading" class="loading">Cargando roadmaps...</div>

<section *ngIf="!loading && !connectionError" class="search-row">
  <input
    type="text"
    placeholder="Buscar por título o descripción"
    [(ngModel)]="search"
    (ngModelChange)="applyFilter()"
  />
</section>

<section *ngIf="!loading && !connectionError" class="grid">
  <article *ngFor="let r of filteredRoadmaps" class="card">
    <h3>{{ r.title }}</h3>
    <p>{{ r.description || 'Sin descripción' }}</p>
    <div class="actions">
      <button class="btn-view" (click)="ver(r)">👁️ Ver</button>
      <button 
        *ngIf="canEdit()" 
        class="btn-edit"
        (click)="editar(r)"
      >
        ✏️ Editar
      </button>
      <span *ngIf="isConsulta()" class="read-only-badge">Solo lectura</span>
    </div>
  </article>
</section>

<div *ngIf="!loading && !connectionError && filteredRoadmaps.length === 0" class="empty-state">
  No hay roadmaps para mostrar.
</div>
